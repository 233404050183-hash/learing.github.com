
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - LMS Học liệu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Roboto', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg,#0d6efd,#6ea8fe);
        }

        .login-container{
            width:380px;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .login-title{
            text-align:center;
            margin-bottom:25px;
            font-size:24px;
            font-weight:700;
            color:#0d6efd;
        }

        .form-group{
            margin-bottom:20px;
        }

        .form-group label{
            display:block;
            margin-bottom:6px;
            font-weight:500;
        }

        .form-group input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .form-group input:focus{
            border-color:#0d6efd;
        }

        .login-btn{
            width:100%;
            padding:12px;
            background:#0d6efd;
            border:none;
            color:white;
            border-radius:8px;
            font-weight:500;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#0b5ed7;
        }

        .error{
            color:red;
            font-size:13px;
            margin-top:5px;
        }

        .extra{
            text-align:center;
            margin-top:15px;
            font-size:14px;
        }

        .extra a{
            color:#0d6efd;
            text-decoration:none;
        }

        .extra a:hover{
            text-decoration:underline;
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="login-title">Đăng nhập LMS</div>

    <form onsubmit="return login()">
        
        <div class="form-group">
            <label>Tài khoản</label>
            <input type="text" id="username" placeholder="Nhập tài khoản">
        </div>

        <div class="form-group">
            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">
            <div id="error" class="error"></div>
        </div>

        <button type="submit" class="login-btn">Đăng nhập</button>

        <div class="extra">
            Chưa có tài khoản? <a href="#">Đăng ký</a>
        </div>
    </form>
</div>

<script>
function login(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    // Lấy user từ localStorage theo mã (id)
    let userData = localStorage.getItem(username);

    if(userData == null){
        document.getElementById("error").innerText = "Tài khoản không tồn tại!";
        return false;
    }

    let user = JSON.parse(userData);

    // Kiểm tra mật khẩu
    if(user.password !== password){
        document.getElementById("error").innerText = "Sai mật khẩu!";
        return false;
    }

    alert("Đăng nhập thành công!");

    // 👉 PHÂN QUYỀN
    if(user.role === "student"){
        window.location.href = "Trangchusinhvien.html";
    } 
    else if(user.role === "teacher"){
        window.location.href = "Trangchusinhvien.html";
    }

    return false;
}
</script>

</body>
</html>
